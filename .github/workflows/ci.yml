name: CI Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies (src)
      run: dotnet restore backend/src/RestaurantDashboard.sln
    
    - name: Build solution
      run: dotnet build backend/src/RestaurantDashboard.sln --configuration Release --no-restore
    
    - name: Restore dependencies (tests)
      run: dotnet restore backend/tests/RestaurantDashboard.Tests/RestaurantDashboard.Tests.csproj
    
    - name: Run tests
      run: dotnet test backend/tests/RestaurantDashboard.Tests/RestaurantDashboard.Tests.csproj --configuration Release --no-build --verbosity normal
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: '**/TestResults/'
