name: Code Quality

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore backend/src/RestaurantDashboard.sln
    
    - name: Check build warnings
      run: dotnet build backend/src/RestaurantDashboard.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=false
    
    - name: Run analyzers
      run: dotnet build backend/src/RestaurantDashboard.sln --configuration Release --no-restore /p:EnforceCodeStyleInBuild=true
