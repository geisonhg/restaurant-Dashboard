version: 2
updates:
  # NuGet packages
  - package-ecosystem: "nuget"
    directory: "/backend/src"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "geisonhg"
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    reviewers:
      - "geisonhg"
    labels:
      - "ci-cd"
      - "github-actions"
    commit-message:
      prefix: "ci"
